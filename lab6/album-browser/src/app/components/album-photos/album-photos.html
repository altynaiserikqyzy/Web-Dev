<div class="container">
  <div class="header">
    <h2>Photos from Album #{{ albumId }}</h2>
    <button (click)="goBack()" class="back-btn">← Back to Album</button>
  </div>

  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading photos...</p>
  </div>

  <div *ngIf="error" class="error">
    <p>Failed to load photos. Please try again.</p>
    <button (click)="loadPhotos()" class="retry-btn">Retry</button>
  </div>

  <div *ngIf="!loading && !error" class="photos-grid">
    <div *ngFor="let photo of photos" class="photo-card">
      <img [src]="photo.thumbnailUrl" [alt]="photo.title" class="photo-img">
      <div class="photo-title">{{ photo.title }}</div>
    </div>

    <div *ngIf="photos.length === 0" class="empty-state">
      <p>No photos found for this album.</p>
    </div>
  </div>
</div>
